<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资产管理</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- 页面头部 -->
        <header class="header">
            <div class="header-content">
                <div class="header-top">
                    <div class="avatar-container">
                        <div class="avatar-circle" id="avatarCircle">
                            <img id="avatarImage" src="" alt="头像" class="avatar-image">
                            <div class="avatar-placeholder" id="avatarPlaceholder">
                                <span class="avatar-plus">+</span>
                            </div>
                        </div>
                        <input type="file" id="avatarInput" class="avatar-input" accept="image/*">
                    </div>
                    <h1 class="header-title">个人资产管理</h1>
                </div>
            </div>
        </header>

        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 左侧：表单区域 -->
            <section class="form-section">
                <div class="card">
                    <h2 class="section-title">添加记录</h2>

                    <form class="form-container">
                        <!-- 日期输入 -->
                        <div class="form-group">
                            <label for="dateInput">日期</label>
                            <input type="month" id="dateInput" class="form-input">
                        </div>

                        <!-- 账户总值区域 -->
                        <div class="form-section-inner">
                            <h3 class="form-subsection-title">账户总值</h3>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="pingAn_bank_total">平安银行总值</label>
                                    <input type="number" id="pingAn_bank_total" placeholder="0.00" step="0.01"
                                        class="form-input">
                                </div>
                                <div class="form-group">
                                    <label for="pingAn_security_total">平安证券总值</label>
                                    <input type="number" id="pingAn_security_total" placeholder="0.00" step="0.01"
                                        class="form-input">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="alipay_total">支付宝总值</label>
                                    <input type="number" id="alipay_total" placeholder="0.00" step="0.01"
                                        class="form-input">
                                </div>
                                <div class="form-group">
                                    <label for="agriculture_bank_total">农业银行总值</label>
                                    <input type="number" id="agriculture_bank_total" placeholder="0.00" step="0.01"
                                        class="form-input">
                                </div>
                            </div>
                        </div>

                        <!-- 投资资产区域 -->
                        <div class="form-section-inner">
                            <h3 class="form-subsection-title">投资资产</h3>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="pingAn_bank_fund">平安银行基金市值</label>
                                    <input type="number" id="pingAn_bank_fund" placeholder="0.00" step="0.01"
                                        class="form-input">
                                </div>
                                <div class="form-group">
                                    <label for="pingAn_security_fund">平安证券基金市值</label>
                                    <input type="number" id="pingAn_security_fund" placeholder="0.00" step="0.01"
                                        class="form-input">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="alipay_fund">支付宝基金市值</label>
                                    <input type="number" id="alipay_fund" placeholder="0.00" step="0.01"
                                        class="form-input">
                                </div>
                                <div class="form-group">
                                    <label for="xueqiu_fund">雪球基金市值</label>
                                    <input type="number" id="xueqiu_fund" placeholder="0.00" step="0.01"
                                        class="form-input">
                                </div>
                            </div>

                            <div class="form-row form-row-single">
                                <div class="form-group">
                                    <label for="sf_stock">顺丰控股市值</label>
                                    <input type="number" id="sf_stock" placeholder="0.00" step="0.01"
                                        class="form-input">
                                </div>
                            </div>
                        </div>

                        <!-- 提交按钮 -->
                        <button type="button" id="addBtn" class="btn-primary">添加记录</button>
                    </form>
                </div>
            </section>
            <!-- 右侧：图表区域 -->
            <section class="charts-section">
                <!-- 现金流趋势 -->
                <div class="card">
                    <h2 class="section-title">现金流趋势</h2>
                    <div id="cashChart" class="chart"></div>
                </div>

                <!-- 总资产趋势 -->
                <div class="card">
                    <h2 class="section-title">总资产增长</h2>
                    <div id="totalChart" class="chart"></div>
                </div>

                <!-- 资产占比分布 -->
                <div class="card">
                    <h2 class="section-title">资产配置</h2>
                    <div id="pieChart" class="chart"></div>
                </div>
            </section>
        </main>

        <!-- 数据表格区域 -->
<section class="table-section">
    <div class="card">
        <h2 class="section-title">历史记录</h2>
        
        <!-- Tab 按钮 -->
        <div class="table-tabs">
            <button class="tab-btn active" data-tab="accounts">账户总值</button>
            <button class="tab-btn" data-tab="funds">基金市值</button>
            <button class="tab-btn" data-tab="derived">衍生数据</button>
        </div>

        <div class="table-wrapper">
            <!-- 账户总值表格 -->
            <table id="accountsTable" class="data-table table-tab-content active">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>平安银行总值</th>
                        <th>平安证券总值</th>
                        <th>支付宝总值</th>
                        <th>农业银行总值</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="accountsTableBody">
                </tbody>
            </table>

            <!-- 基金市值表格 -->
            <table id="fundsTable" class="data-table table-tab-content">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>平安银行基金市值</th>
                        <th>平安证券基金市值</th>
                        <th>支付宝基金市值</th>
                        <th>雪球基金市值</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="fundsTableBody">
                </tbody>
            </table>

            <!-- 衍生数据表格 -->
            <table id="derivedTable" class="data-table table-tab-content">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>顺丰控股市值</th>
                        <th>现金流</th>
                        <th>基金资产</th>
                        <th>股票资产</th>
                        <th>总资产</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="derivedTableBody">
                </tbody>
            </table>
        </div>
    </div>
</section>
    </div>

    <script src="script.js"></script>
</body>

</html>
