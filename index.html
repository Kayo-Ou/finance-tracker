<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资产管理工具</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入 ECharts 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>💰 个人资产管理和投资记录</h1>
        
        <!-- 三个图表区域 -->
        <div class="charts-container">
            <div class="chart-box">
                <h3>现金存款变化趋势</h3>
                <div id="cashChart" style="width: 100%; height: 300px;"></div>
            </div>
            
            <div class="chart-box">
                <h3>资产占比分布</h3>
                <div id="pieChart" style="width: 100%; height: 300px;"></div>
            </div>
            
            <div class="chart-box">
                <h3>总资产变化趋势</h3>
                <div id="totalChart" style="width: 100%; height: 300px;"></div>
            </div>
        </div>

        <!-- 数据输入和表格区域 -->
        <div class="data-section">
            <h2>📊 每月资产记录</h2>
            
            <!-- 输入表单 -->
            <div class="input-form">
                <h3>添加新记录</h3>
                <div class="form-group">
                    <label>统计日期:</label>
                    <input type="month" id="dateInput" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>支付宝总额:</label>
                        <input type="number" id="alipayTotal" placeholder="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>支付宝基金:</label>
                        <input type="number" id="alipayFund" placeholder="0" step="0.01">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>平安银行总额:</label>
                        <input type="number" id="bankTotal" placeholder="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>平安银行基金:</label>
                        <input type="number" id="bankFund" placeholder="0" step="0.01">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>蛋卷基金:</label>
                        <input type="number" id="eggFund" placeholder="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>平安证券总额:</label>
                        <input type="number" id="securityTotal" placeholder="0" step="0.01">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>平安证券基金:</label>
                        <input type="number" id="securityFund" placeholder="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>农业银行总额:</label>
                        <input type="number" id="agricultureBank" placeholder="0" step="0.01">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>顺丰控股:</label>
                        <input type="number" id="sfExpress" placeholder="0" step="0.01">
                    </div>
                </div>

                <button id="addBtn" class="btn-add">➕ 添加记录</button>
            </div>

            <!-- 数据表格 -->
            <div class="table-section">
                <h3>历史记录</h3>
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>统计日期</th>
                            <th>支付宝总额</th>
                            <th>支付宝基金</th>
                            <th>平安银行总额</th>
                            <th>平安银行基金</th>
                            <th>蛋卷基金</th>
                            <th>平安证券总额</th>
                            <th>平安证券基金</th>
                            <th>农业银行总额</th>
                            <th>顺丰控股</th>
                            <th>现金存款</th>
                            <th>投资基金</th>
                            <th>持有股票</th>
                            <th>总资产</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
